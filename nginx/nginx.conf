events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # [WATERB_MIGRATION_B] 아래 모든 `location /edream/` 및 `proxy_pass .../edream/` — 백엔드 context-path·프론트 API base와 동시 변경.
    # [WATERB_MIGRATION_C] upstream 호스트(dev.uaram, test3, ieum.gunsan 등)는 인프라·인증서 정책에 맞게 별도 조정.

    # 로그 설정
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # HTTP → HTTPS 리다이렉트 (포트 80)
    server {
        listen 80;
        server_name dev.uaram.co.kr;
        return 301 https://$host$request_uri;
    }

    # HTTPS 서버 (포트 443)
    server {
        listen 443 ssl;
        server_name dev.uaram.co.kr;

        # SSL 인증서 설정
        ssl_certificate /etc/nginx/ssl/Wildcard.uaram.co.kr_pem.pem;
        ssl_certificate_key /etc/nginx/ssl/KeyFile_Wildcard.uaram.co.kr_pem.key;

        # SSL 프로토콜 설정
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # 응답 버퍼 설정
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;

        # 백엔드 API 프록시 (CORS 해결)
        # 브라우저는 같은 도메인으로 요청 → nginx가 내부에서 백엔드로 중계
        location /edream/ {
            proxy_pass https://dev.uaram.co.kr:8443/edream/;
            proxy_http_version 1.1;
            proxy_ssl_verify off;  # 내부 연결이므로 SSL 인증서 검증 생략
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Next.js 프론트엔드로 프록시
        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # HTTP → HTTPS 리다이렉트 (포트 80)
    server {
        listen 80;
        server_name test3.uaram.co.kr;
        return 301 https://$host$request_uri;
    }

    # HTTPS 서버 (포트 443)
    server {
        listen 443 ssl;
        server_name test3.uaram.co.kr;

        # SSL 인증서 설정
        ssl_certificate /etc/nginx/ssl/Wildcard.uaram.co.kr_pem.pem;
        ssl_certificate_key /etc/nginx/ssl/KeyFile_Wildcard.uaram.co.kr_pem.key;

        # SSL 프로토콜 설정
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # 응답 버퍼 설정
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;

        # 백엔드 API 프록시 (CORS 해결)
        # 브라우저는 같은 도메인으로 요청 → nginx가 내부에서 백엔드로 중계
