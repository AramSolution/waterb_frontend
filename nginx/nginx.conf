            proxy_cache_bypass $http_upgrade;
        }
    }

    # HTTP → HTTPS 리다이렉트 (포트 80)
    server {
        listen 80;
        server_name ieum.gunsan.go.kr;
        return 301 https://$host$request_uri;
    }

    # HTTPS 서버 (포트 443)
