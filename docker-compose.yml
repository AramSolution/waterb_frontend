services:
  frontend:
    container_name: waterb_frontend
    build:
      context: .
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* 는 빌드 타임에 번들에 포함되므로 args로 전달
      # nginx가 /water/ 경로를 백엔드로 중계 — API_BASE는 호스트만(api.ts가 /water 붙임)
      args:
        NEXT_PUBLIC_API_BASE_URL: https://dev.uaram.co.kr
        NEXT_PUBLIC_PAGE_SIZE: 15
        # Next가 /water를 직접 받을 때(직접 3000 접속 등) dev 백엔드로 프록시 — Dockerfile ARG/ENV, next.config.js와 동기화
        WATER_REWRITE_DESTINATION: https://dev.uaram.co.kr:8443/water
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: waterb_nginx
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    # host.docker.internal → 호스트 서버(백엔드가 실행 중인 서버)로 연결
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - frontend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
