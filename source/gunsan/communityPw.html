<!DOCTYPE html>

    <link  rel="stylesheet" href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-round.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>
<body>

    <header class="header portal">

            <nav class="nav" aria-label="메인 메뉴">
                <ul class="nav-list">
                    <li><a href="#">교육지원사업 소개</a></li>

                    <li>

                        </a>
                    </li>
                </ul>
            </nav>
        </div>
        <div class="app" style="display: none;">
            <div class="flex-sb">
                <h1>
                    <a href="/">
                        <img src="images/logo.png" alt="군산시꿈이음센터">
                    </a>
                </h1>
                <button type="button" class="menuOpen" aria-controls="mobile-menu" aria-expanded="false">
                    <img src="images/icon/ico_menu_32.png" alt="메뉴 열기">
                </button>
            </div>
            <div id="mobile-menu" class="moMenu" aria-hidden="true">
                <div class="flex-sb">
                    <div class="logo-area">
                        <img src="images/logo.png" alt="군산시꿈이음센터">
                    </div>
                    <button type="button" class="menuClose" aria-controls="mobile-menu" aria-expanded="true">
                        <img src="images/icon/ico_close_32.png" alt="메뉴 닫기">
                    </button>
                </div>
                <nav class="nav" aria-label="모바일 메인 메뉴">
                    <ul>
                        <li><a href="#">교육지원사업 소개</a></li>
                        <li><a href="#">교육지원사업 신청/결과</a></li>
                        <li><a href="#">커뮤니티</a></li>
                        <li>
                            <a href="#" target="_blank" rel="noopener noreferrer" title="새 창 열림">
                                관리자페이지

                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>
    <main id="main_content">
        <section class="mainViewVisual" aria-labelledby="visualTitle">
            <div class="mainViewVisualInner">
                <div id="visualTitle" class="mainViewVisualEng">COMMUNITY</div>
                <p class="mainViewVisualKor">꿈이음센터의 소식을 확인하세요</p>
            </div>
        </section>
        <div class="registrationContainer qnaRegister bizInput">
            <div class="inner">
                <div class="qnaPwWrap t_center">
                    <div class="bd-24 mb-24">비밀번호 입력</div>
                    <div class="bd-18 mb-40">문의글 작성시 설정한 비밀번호를 입력해 주세요 </div>
                    <div class="formControl">
                        <input type="text" id="writePw" class="inputField" placeholder="비밀번호를 입력해주세요">
                    </div>
                    <div class="formActions">
                        <button type="submit" class="btnSubmit">등록하기</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="innerContainer inner">
            <div class="footerInfoWrap">
                <div class="footerLogo">
                    <img src="images/logo_w.png" alt="군산시 꿈이음센터">
                </div>
                <div class="addressArea">
                    <address>
                        [54080] 전북특별자치도 군산시 조촌로 22 <span>|</span> 대표전화 : 063)450-2600
                    </address>
                    <p class="copyright">Copyright ⓒ 2025 GUNSAN COUNTY. All Rights Reserved.</p>
                </div>
            </div>
            <div class="footerLinkWrap">
                <div class="siteSelectBox">
                    <select id="familySite" title="관련 사이트 선택" class="customSelect">
                        <option value="">개인정보 처리방침</option>
                        <option value="https://www.gunsan.go.kr">군산시청</option>
                        <option value="#">교육지원사업</option>
                    </select>
                </div>
            </div>
        </div>
    </footer>
</body>
<script>
    /* 헤더 */
    const menuOpen = document.querySelector('.menuOpen');
    const menuClose = document.querySelector('.menuClose');
    const moMenu = document.querySelector('.moMenu');

    menuOpen.addEventListener('click', () => {
        moMenu.classList.add('active');
        menuClose.focus(); 
    });

    menuClose.addEventListener('click', () => {
        moMenu.classList.remove('active');
        menuOpen.focus();
    });

    /* 탭 */
    document.addEventListener('DOMContentLoaded', () => {
    const tabLinks = document.querySelectorAll('.mainViewTabLink');
    const tabPanels = document.querySelectorAll('.mainViewTabPanel');

    tabLinks.forEach(link => {
        link.addEventListener('click', (e) => {
        e.preventDefault();

        tabLinks.forEach(l => {
            l.classList.remove('active');
            l.setAttribute('aria-selected', 'false');
        });
        tabPanels.forEach(p => p.classList.remove('active'));

        link.classList.add('active');
        link.setAttribute('aria-selected', 'true');

        const targetId = link.getAttribute('href').replace('#', '');
        const targetPanel = document.getElementById(targetId);
        if (targetPanel) {
            targetPanel.classList.add('active');
        }
        });
    });
    });
</script>
</html>
