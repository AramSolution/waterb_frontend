    <main id="main_content">
        <section class="mainViewVisual" aria-labelledby="visualTitle">

                <p class="mainViewVisualKor">꿈이음센터의 소식을 확인하세요</p>

        </section>
        <div class="registrationContainer qnaRegister bizInput">
            <div class="inner">
                <form class="mainForm">
                    <section class="formSection">
                        <div class="sectionHeader">
                            <div class="sectionTitle">문의하기</div>
                        </div>
                        <div class="formGrid">
                            <div class="formRow">
                                <label for="writeName" class="formLabel">작성자명</label>
                                <div class="formControl">
                                    <input type="text" id="writeName" class="inputField" placeholder="작성자명을 입력해주세요">
                                </div>
                            </div>
                            <div class="formRow">
                                <label for="writePw" class="formLabel">비밀번호</label>
                                <div class="formControl">
                                    <input type="text" id="writePw" class="inputField" placeholder="답변 조회 시 사용할 비밀번호 입력해주세요">
                                </div>
                            </div>
                            <div class="formRow">
                                <label for="qnaContent" class="formLabel">문의내용</label>
                                <div class="formControl">
                                    <textarea id="qnaContent" class="textAreaField" placeholder="문의내용을 입력해주세요"></textarea>
                                </div>
                            </div>
                            <div class="formRow">
                                <span class="formLabel">
                                    첨부파일
                                    <input type="file" id="fileInput" class="hiddenInput" multiple>
                                    <label for="fileInput" class="btnFileAdd" aria-label="파일 첨부하기">
                                        <img src="../images/icon/ico_file_add.png" alt="" aria-hidden="true">
                                    </label>
                                </span>
                                <div class="formControl fileListContainer">
                                    <div class="file hwp">
                                        <span>filename.hwp</span>
                                        <button type="button" class="btnFileDel" aria-label="filename.hwp 파일 삭제">
                                            <img src="../images/icon/ico_file_del.png" alt="" aria-hidden="true">
                                        </button>
                                    </div>
                                    <div class="file pdf">
                                        <span>filename.pdf</span>
                                        <button type="button" class="btnFileDel" aria-label="filename.pdf 파일 삭제">
                                            <img src="../images/icon/ico_file_del.png" alt="" aria-hidden="true">
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                    <div class="formActions">
                        <button type="submit" class="btnSubmit">등록하기</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="innerContainer inner">
            <div class="footerInfoWrap">
                <div class="footerLogo">
                    <img src="images/logo_w.png" alt="군산시 꿈이음센터">
                </div>
                <div class="addressArea">
                    <address>
                        [54080] 전북특별자치도 군산시 조촌로 22 <span>|</span> 대표전화 : 063)450-2600
                    </address>
                    <p class="copyright">Copyright ⓒ 2025 GUNSAN COUNTY. All Rights Reserved.</p>
                </div>
            </div>
            <div class="footerLinkWrap">
                <div class="siteSelectBox">
                    <select id="familySite" title="관련 사이트 선택" class="customSelect">
                        <option value="">개인정보 처리방침</option>
                        <option value="https://www.gunsan.go.kr">군산시청</option>
                        <option value="#">교육지원사업</option>
                    </select>
                </div>
            </div>
        </div>
    </footer>
</body>
<script>
    /* 헤더 */
    const menuOpen = document.querySelector('.menuOpen');
    const menuClose = document.querySelector('.menuClose');
    const moMenu = document.querySelector('.moMenu');

    menuOpen.addEventListener('click', () => {
        moMenu.classList.add('active');
        menuClose.focus(); 
    });

    menuClose.addEventListener('click', () => {
        moMenu.classList.remove('active');
        menuOpen.focus();
    });

    /* 탭 */
    document.addEventListener('DOMContentLoaded', () => {
    const tabLinks = document.querySelectorAll('.mainViewTabLink');
    const tabPanels = document.querySelectorAll('.mainViewTabPanel');

    tabLinks.forEach(link => {
        link.addEventListener('click', (e) => {
        e.preventDefault();

        tabLinks.forEach(l => {
            l.classList.remove('active');
            l.setAttribute('aria-selected', 'false');
        });
        tabPanels.forEach(p => p.classList.remove('active'));

        link.classList.add('active');
        link.setAttribute('aria-selected', 'true');

        const targetId = link.getAttribute('href').replace('#', '');
        const targetPanel = document.getElementById(targetId);
        if (targetPanel) {
            targetPanel.classList.add('active');
        }
        });
    });
    });
</script>
</html>
