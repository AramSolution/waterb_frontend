<script>
/* 헤더 조작 */
document.addEventListener('DOMContentLoaded', () => {
    const menuOpen = document.querySelector('.menuOpen');
    const menuClose = document.querySelector('.menuClose');
    const moMenu = document.querySelector('.moMenu');
    const moMenuBg = document.querySelector('.moMenuBg'); 

    menuOpen.addEventListener('click', () => {
        moMenu.classList.add('active');
        document.body.style.overflow = 'hidden'; 
        setTimeout(() => menuClose.focus(), 100); 
    });

    const closeMobileMenu = () => {
        moMenu.classList.remove('active');
        document.body.style.overflow = ''; 
        menuOpen.focus();
    };
    menuClose.addEventListener('click', closeMobileMenu);
    moMenuBg.addEventListener('click', closeMobileMenu);
});

/* 모바일 메뉴 접근성  */
document.addEventListener('DOMContentLoaded', () => {
    const navItems = document.querySelectorAll('.navItem');
    const menuOpen = document.querySelector('.menuOpen');
    const menuClose = document.querySelector('.menuClose');
    const moMenu = document.querySelector('.moMenu');

    menuOpen?.addEventListener('click', () => moMenu.classList.add('active'));
    menuClose?.addEventListener('click', () => moMenu.classList.remove('active'));

    navItems.forEach(item => {
        const btn = item.querySelector('.moMainLink');
        btn.addEventListener('click', () => {
            navItems.forEach(li => li.classList.remove('active'));
            item.classList.add('active');
        });
    });
});
</script>
